<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読書リスト管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #f5f1e8 0%, #faf8f3 100%);
      background-attachment: fixed;
      color: #3d3d3d;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1024px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      padding-top: 2rem;
    }

    .header-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      background-color: rgba(101, 167, 107, 0.1);
      border-radius: 50%;
      margin-bottom: 1rem;
      color: #65a76b;
    }

    h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.1rem;
      color: #888;
      font-weight: 400;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 50px;
      font-family: 'Shippori Mincho', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 700;
    }

    .btn-add {
      background-color: #65a76b;
      color: white;
      box-shadow: 0 4px 12px rgba(101, 167, 107, 0.2);
    }

    .btn-add:hover {
      background-color: #5a9a60;
      box-shadow: 0 6px 16px rgba(101, 167, 107, 0.3);
      transform: translateY(-2px);
    }

    .btn-back {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      background-color: #f5f1e8;
      color: #3d3d3d;
      border: 1px solid #ddd;
      padding: 0.75rem 1.25rem;
      border-radius: 50px;
      font-size: 0.9rem;
      z-index: 100;
    }

    .btn-back:hover {
      background-color: #ede7dc;
      border-color: #999;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid #ddd;
      flex-wrap: wrap;
    }

    .tab-button {
      padding: 1rem 1.5rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      font-family: 'Shippori Mincho', serif;
      font-size: 1rem;
      cursor: pointer;
      color: #888;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .tab-button.active {
      color: #65a76b;
      border-bottom-color: #65a76b;
    }

    .tab-button:hover {
      color: #3d3d3d;
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .book-card {
      background: white;
      border-radius: 0.5rem;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      border: 1px solid #f0f0f0;
      position: relative;
    }

    .book-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      transform: translateY(-2px);
    }

    .book-card-menu {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: none;
      background: white;
      border: 1px solid #ddd;
      border-radius: 0.25rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    .book-card:hover .book-card-menu {
      display: block;
    }

    .book-card-menu button {
      display: block;
      width: 100%;
      padding: 0.5rem 1rem;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      font-size: 0.9rem;
      color: #3d3d3d;
      border-radius: 0;
    }

    .book-card-menu button:hover {
      background-color: #f5f5f5;
    }

    .book-card-menu button.delete:hover {
      background-color: #ffe6e6;
      color: #d32f2f;
    }

    .status-badge {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .status-want {
      background-color: #fff3cd;
      color: #856404;
    }

    .status-reading {
      background-color: #d4edda;
      color: #155724;
    }

    .status-finished {
      background-color: #e2e3e5;
      color: #383d41;
    }

    .book-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .book-author {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 1rem;
    }

    .book-notes {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #f0f0f0;
      font-size: 0.9rem;
      color: #666;
      font-style: italic;
      line-height: 1.5;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #888;
    }

    .empty-state p {
      margin: 0.5rem 0;
      font-family: 'Shippori Mincho', serif;
      font-size: 1.1rem;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 0.5rem;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #666;
      font-size: 0.95rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-bottom: 1px solid #ddd;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-bottom-color: #65a76b;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .modal-footer {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .modal-footer button {
      flex: 1;
      padding: 0.75rem;
    }

    .btn-cancel {
      background-color: #f5f1e8;
      color: #3d3d3d;
      border: 1px solid #ddd;
    }

    .btn-cancel:hover {
      background-color: #ede7dc;
    }

    .btn-submit {
      background-color: #65a76b;
      color: white;
    }

    .btn-submit:hover {
      background-color: #5a9a60;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }

      .books-grid {
        grid-template-columns: 1fr;
      }

      .btn-back {
        bottom: 1rem;
        left: 1rem;
        right: auto;
      }

      .tabs {
        gap: 0.5rem;
      }

      .tab-button {
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-icon">📚</div>
      <h1>読書リスト</h1>
      <p class="subtitle">静かな時間、心に残る一冊を。</p>
    </header>

    <div class="controls">
      <button class="btn-add" onclick="openAddModal()">+ 本を登録する</button>
    </div>

    <div class="tabs">
      <button class="tab-button active" onclick="filterBooks('all')">すべて</button>
      <button class="tab-button" onclick="filterBooks('want_to_read')">読みたい</button>
      <button class="tab-button" onclick="filterBooks('reading')">読んでいる</button>
      <button class="tab-button" onclick="filterBooks('finished')">読み終わった</button>
    </div>

    <div class="books-grid" id="booksGrid"></div>

    <div class="empty-state" id="emptyState" style="display: none;">
      <p>まだ本が登録されていません。</p>
      <p style="font-size: 0.9rem;">新しい本との出会いを記録しましょう。</p>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header" id="modalTitle">本を登録する</div>
      <form id="bookForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="title">タイトル</label>
          <input type="text" id="title" required placeholder="吾輩は猫である">
        </div>
        <div class="form-group">
          <label for="author">著者</label>
          <input type="text" id="author" required placeholder="夏目 漱石">
        </div>
        <div class="form-group">
          <label for="status">ステータス</label>
          <select id="status" required>
            <option value="want_to_read">読みたい</option>
            <option value="reading">読んでいる</option>
            <option value="finished">読み終わった</option>
          </select>
        </div>
        <div class="form-group">
          <label for="notes">メモ</label>
          <textarea id="notes" placeholder="感想や気になったこと..."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeModal()">キャンセル</button>
          <button type="submit" class="btn-submit" id="submitBtn">登録する</button>
        </div>
      </form>
    </div>
  </div>

  <button class="btn-back" onclick="goBack()">← 戻る</button>

  <script>
    const STORAGE_KEY = 'zen-library-books';
    let currentFilter = 'all';
    let editingId = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderBooks();
    });

    // Load books from localStorage
    function getBooks() {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? JSON.parse(stored) : [];
    }

    // Save books to localStorage
    function saveBooks(books) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
    }

    // Render books
    function renderBooks() {
      const books = getBooks();
      const filtered = currentFilter === 'all' 
        ? books 
        : books.filter(b => b.status === currentFilter);
      
      const sorted = filtered.sort((a, b) => b.addedAt - a.addedAt);
      const grid = document.getElementById('booksGrid');
      const empty = document.getElementById('emptyState');

      if (sorted.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      grid.innerHTML = sorted.map(book => `
        <div class="book-card">
          <div class="book-card-menu">
            <button onclick="openEditModal('${book.id}')">編集</button>
            <button class="delete" onclick="deleteBook('${book.id}')">削除</button>
          </div>
          <span class="status-badge status-${book.status}">
            ${getStatusLabel(book.status)}
          </span>
          <div class="book-title">${escapeHtml(book.title)}</div>
          <div class="book-author">${escapeHtml(book.author)}</div>
          ${book.notes ? `<div class="book-notes">"${escapeHtml(book.notes)}"</div>` : ''}
        </div>
      `).join('');
    }

    // Get status label
    function getStatusLabel(status) {
      const labels = {
        'want_to_read': '読みたい',
        'reading': '読んでいる',
        'finished': '読み終わった'
      };
      return labels[status] || status;
    }

    // Filter books
    function filterBooks(filter) {
      currentFilter = filter;
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      renderBooks();
    }

    // Open add modal
    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = '本を登録する';
      document.getElementById('submitBtn').textContent = '登録する';
      document.getElementById('bookForm').reset();
      document.getElementById('modal').classList.add('active');
    }

    // Open edit modal
    function openEditModal(id) {
      const books = getBooks();
      const book = books.find(b => b.id === id);
      if (!book) return;

      editingId = id;
      document.getElementById('modalTitle').textContent = '本を編集する';
      document.getElementById('submitBtn').textContent = '保存する';
      document.getElementById('title').value = book.title;
      document.getElementById('author').value = book.author;
      document.getElementById('status').value = book.status;
      document.getElementById('notes').value = book.notes || '';
      document.getElementById('modal').classList.add('active');
    }

    // Close modal
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      editingId = null;
    }

    // Handle form submit
    function handleSubmit(event) {
      event.preventDefault();
      const title = document.getElementById('title').value;
      const author = document.getElementById('author').value;
      const status = document.getElementById('status').value;
      const notes = document.getElementById('notes').value;

      const books = getBooks();

      if (editingId) {
        const book = books.find(b => b.id === editingId);
        if (book) {
          book.title = title;
          book.author = author;
          book.status = status;
          book.notes = notes;
        }
      } else {
        books.unshift({
          id: Date.now().toString(),
          title,
          author,
          status,
          notes,
          addedAt: Date.now()
        });
      }

      saveBooks(books);
      closeModal();
      renderBooks();
    }

    // Delete book
    function deleteBook(id) {
      if (!confirm('この本を削除してもよろしいですか？')) return;
      let books = getBooks();
      books = books.filter(b => b.id !== id);
      saveBooks(books);
      renderBooks();
    }

    // Go back
    function goBack() {
      window.history.back();
    }

    // Escape HTML
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Close modal when clicking outside
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') {
        closeModal();
      }
    });
  </script>
</body>
</html>
